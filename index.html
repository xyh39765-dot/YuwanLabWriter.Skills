<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>YuwanLabWriter Skills</title>
    <style>
      :root {
        color-scheme: light dark;
        --bg: #f7f7f4;
        --fg: #181a1f;
        --muted: #667067;
        --line: #d9ddd4;
        --panel: #ffffff;
        --accent: #1b6b54;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --bg: #111411;
          --fg: #eceee8;
          --muted: #a8b0a8;
          --line: #2c332e;
          --panel: #181d19;
          --accent: #7cc9a9;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--fg);
        font: 15px/1.5 ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(1040px, calc(100vw - 32px));
        margin: 0 auto;
        padding: 48px 0;
      }

      header {
        border-bottom: 1px solid var(--line);
        padding-bottom: 24px;
        margin-bottom: 28px;
      }

      h1 {
        margin: 0 0 8px;
        font-size: 34px;
        line-height: 1.1;
        letter-spacing: 0;
      }

      p {
        margin: 0;
        color: var(--muted);
        max-width: 760px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        margin-bottom: 18px;
      }

      code {
        background: color-mix(in srgb, var(--panel) 80%, var(--line));
        border: 1px solid var(--line);
        border-radius: 6px;
        padding: 2px 6px;
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
        font-size: 13px;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
        gap: 14px;
      }

      .skill {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 8px;
        padding: 16px;
      }

      .skill h2 {
        margin: 0 0 4px;
        font-size: 17px;
        letter-spacing: 0;
      }

      .meta {
        color: var(--muted);
        font-size: 13px;
        margin-bottom: 12px;
      }

      .tags {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        margin: 12px 0;
      }

      .tag {
        border: 1px solid var(--line);
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 12px;
        color: var(--muted);
      }

      .links {
        display: flex;
        flex-wrap: wrap;
        gap: 10px;
        margin-top: 14px;
      }

      a {
        color: var(--accent);
        text-decoration: none;
      }

      a:hover {
        text-decoration: underline;
      }

      .status {
        color: var(--muted);
      }
    </style>
  </head>
  <body>
    <main>
      <header>
        <h1>YuwanLabWriter Skills</h1>
        <p>
          Official instruction-only Skill catalog for YuwanLabWriter native Agents.
          The app reads approved packages from this static catalog and installs
          selected Skills into the user's local library.
        </p>
      </header>

      <section class="toolbar">
        <span id="status" class="status">Loading marketplace...</span>
        <a href="./marketplace.json">marketplace.json</a>
      </section>

      <section id="skills" class="grid" aria-live="polite"></section>
    </main>

    <script>
      async function loadMarketplace() {
        const status = document.getElementById('status');
        const root = document.getElementById('skills');
        try {
          const response = await fetch('./marketplace.json', { cache: 'no-store' });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const marketplace = await response.json();
          status.textContent = `${marketplace.skills.length} approved Skill package(s)`;
          root.innerHTML = marketplace.skills.map(renderSkill).join('');
        } catch (error) {
          status.textContent = `Failed to load marketplace: ${error.message}`;
        }
      }

      function renderSkill(skill) {
        const tags = (skill.tags || []).map((tag) => `<span class="tag">${escapeHtml(tag)}</span>`).join('');
        const install = `npx yuwanlab skill install ${skill.id}`;
        return `
          <article class="skill">
            <h2>${escapeHtml(skill.display_name || skill.name)}</h2>
            <div class="meta">${escapeHtml(skill.id)} · v${escapeHtml(skill.version)} · @${escapeHtml(skill.author_github)}</div>
            <p>${escapeHtml(skill.description || '')}</p>
            <div class="tags">${tags}</div>
            <code>${escapeHtml(install)}</code>
            <div class="links">
              <a href="./${encodeURI(skill.entry_url)}">SKILL.md</a>
              <a href="./${encodeURI(skill.skill_url)}">skill.yaml</a>
              ${skill.readme_url ? `<a href="./${encodeURI(skill.readme_url)}">README</a>` : ''}
            </div>
          </article>
        `;
      }

      function escapeHtml(value) {
        return String(value)
          .replaceAll('&', '&amp;')
          .replaceAll('<', '&lt;')
          .replaceAll('>', '&gt;')
          .replaceAll('"', '&quot;')
          .replaceAll("'", '&#039;');
      }

      loadMarketplace();
    </script>
  </body>
</html>
